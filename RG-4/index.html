<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrapper">

    <div class="eyebrow">
      <span></span>
      <p>Satic &middot; Week 1</p>
      <span class="right"></span>
    </div>

    <h1>Create Your Account</h1>
    <p class="subtitle">Fill in your details to complete registration</p>

    <form action="#successModal">

      <!-- Full Name -->
      <div class="field">
        <label for="fullname">Full Name <span class="req">*</span></label>
        <div class="input-shell">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email Address <span class="req">*</span></label>
        <div class="input-shell">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">Password <span class="req">*</span></label>
        <div class="input-shell">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="6" title="Password must be at least 6 characters">
        </div>
        <small class="hint">Minimum 6 characters</small>
      </div>

      <!-- Gender -->
      <div class="field">
        <label>Gender <span class="req">*</span></label>
        <div class="gender-group">
          <input type="radio" id="male" name="gender" value="male" required>
          <label for="male">Male</label>

          <input type="radio" id="female" name="gender" value="female" required>
          <label for="female">Female</label>

          <input type="radio" id="other" name="gender" value="other" required>
          <label for="other">Other</label>
        </div>
      </div>

      <!-- Course / Interest -->
      <div class="field">
        <label for="course">Course / Interest <span class="req">*</span></label>
        <select id="course" name="course" required>
          <option value="" disabled selected>Select Course / Interest</option>
          <option value="frontend">Frontend Development</option>
          <option value="backend">Backend Development</option>
          <option value="fullstack">Full Stack Development</option>
          <option value="datascience">Data Science</option>
          <option value="uiux">UI/UX Design</option>
        </select>
      </div>

      <!-- Submit -->
      <button type="submit">
        <span>Register Now</span>
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>

    </form>

    <footer>&copy; 2026 Satic &middot; Frontend Development Internship</footer>

  </div>

  <!-- Success Popup -->
  <div class="modal-overlay" id="successModal">
    <div class="modal-box">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <h2>Registration Submitted!</h2>
      <p>Thank you for registering. We've received your details successfully.</p>
      <a href="index.html" class="modal-ok-btn" id="modalOkBtn">OK</a>
    </div>
  </div>

</body>
</html>
